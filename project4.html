<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Tax Calculator</title>
</head>
<body style="background-color: #0f0f0f; color: #f5f5f5;font-family: sans-serif;height:100vh;display: flex;justify-content: center;align-items: center;margin:0;">
     <div id="parent" style=" background: linear-gradient(135deg, #1e1e1e, #292929);padding: 40px; border-radius: 20px; box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);width: 350px; text-align: center;">
        <h1 style="color: #00ffcc;margin-bottom: 25px;text-shadow: 0 0 8px #00ffcc;">Income Tax Calculator</h1>
        <form>
            <label for="income" style="display: block;font-size: 18px;margin-bottom: 8px;"></label>
            <input type="number" id="income" name="income" style="width: 90%;
             padding: 10px;
             font-size: 16px;
             border: none;
              border-radius: 8px;
              outline: none;
             background: #222;
              color: #fff;
             text-align: center;
             transition: all 0.3s ease;">
            <br><br>
            <button type="submit" style=" margin-top: 20px;
                  background: #00ffcc;
                    color: #000;
                    font-weight: bold;
                  border: none;
                  padding: 12px 25px;
                  border-radius: 10px;
                 font-size: 16px;
                 cursor: pointer;
                  transition: all 0.3s ease;">
            Calculate income
            </button>
        </form>

        <h2 style="margin-top: 25px;font-size: 22px;color:#ffcc00;text-shadow: 0 0 5px #ffcc00;">Total Tax:</h2>
     </div>

</body>
<script src="./project4.js"></script>
</html>
